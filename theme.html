<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>테마 상승 현황</title>

<style>
    /* ===== 공통 기본 ===== */
    * {
        box-sizing: border-box;
    }

    body {
    font-family: "Noto Sans KR", sans-serif;
    background: #f5f6fa;
    margin: 0;
    padding: 20px;

    box-sizing: border-box;
    max-width: 100%;

    word-break: keep-all;
    overflow-wrap: break-word;
    }


    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    /* ===== 테이블 컨테이너 ===== */
    .table-container {
        display: flex;
        justify-content: center;
        overflow-x: auto;               /* 모바일 가로 스크롤 허용 */
        -webkit-overflow-scrolling: touch;
    }

    /* ===== 테이블 ===== */
    table {
        border-collapse: collapse;
        width: 90%;
        margin: 0 auto;
        max-width: 1200px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        text-align: center;
        white-space: normal;            /* 줄바꿈 허용 */
        word-break: break-word;
    }

    /* 테이블 셀 줄바꿈 핵심 트릭 */
    td {
        max-width: 0;
    }

    th {
        background: #2d98da;
        color: white;
        font-weight: bold;
    }

    tr:nth-child(even) {
        background: #f8f9fc;
    }

    tr:hover {
        background: #eaf6ff;
    }

    /* ===== 모바일 대응 ===== */
    @media (max-width: 768px) {
        body {
            padding: 12px;
        }

        table {
            width: 100%;
        }

        th, td {
            padding: 8px 10px;
            text-align: left;            /* 모바일 가독성 개선 */
            font-size: 14px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2></h2>
    <div id="loading" class="loading">데이터 불러오는 중...</div>
    <table id="themeTable" style="display:none;">
        <thead>
            <tr>
                <th>테마명</th>
                <th>상승률 (%)</th>
                <th>대표종목</th>
                <th>전체종목 수</th>
                <th>상승</th>
                <th>하락</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const sheetID = "16pX_MlswXTy7wA1kGcITM2lQfmXxXi4gZ3CKpI3UWpE";
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&gid=0`;

fetch(url)
    .then(res => res.text())
    .then(data => {
        const json = JSON.parse(data.substring(47).slice(0, -2));
        const rows = json.table.rows;

        const tbody = document.querySelector("#themeTable tbody");

        rows.forEach(row => {
            const tr = document.createElement("tr");

            row.c.forEach((cell, index) => {
                const td = document.createElement("td");
                const value = cell ? cell.v : "";
                td.textContent = value;

                // 상승률 컬럼 색상 처리
                if (index === 1 && value !== "") {
                    if (parseFloat(value) > 0) {
                        td.classList.add("positive");
                    } else {
                        td.classList.add("negative");
                    }
                }

                tr.appendChild(td);
            });

            tbody.appendChild(tr);
        });

        document.getElementById("loading").style.display = "none";
        document.getElementById("themeTable").style.display = "table";
    })
    .catch(error => {
        document.getElementById("loading").innerText = "데이터를 불러오지 못했습니다.";
        console.error(error);
    });
</script>

</body>
</html>
