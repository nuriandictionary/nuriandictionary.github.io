<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

button{
    width:150px;
    height:50px;
    font-size:20px;
    cursor:pointer;
}

#stocks{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(700px,1fr));
    gap:30px;
}

.stock{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.stock h2{
    text-align:center;
}

.stock img{
    width:100%;
    border-radius:10px;
}

</style>

</head>

<body>

<!-- <h1>뭐살까</h1> -->

<div class="buttons">

<button onclick="loadStocks(1273627440)">
눌림매매
</button>

<button onclick="loadStocks(710038992)">
돌파매매
</button>

</div>

<div id="stocks"></div>

<script>

async function loadStocks(gid){

    const url =
    `https://docs.google.com/spreadsheets/d/1DTmUxYucDWge4wZDUcGJRZQ5KSM-wpsJkxfn48WfA4E/export?format=csv&gid=${gid}`;

    try{

        const response = await fetch(url);

        const csv = await response.text();

        const rows = csv.trim().split("\n");

        let html = "";

        rows.forEach(row => {

            const cols = row.split(",");

            if(cols.length < 2) return;

            const code = cols[0]
                .trim()
                .replace(/"/g,"")
                .replace(/'/g,"")
                .padStart(6, "0");

                
            const image = cols[1]
                .trim()
                .replace(/"/g,"")
                .replace(/'/g,"");

            html += `
            <div class="stock">

                <h2>${code}</h2>

                <img src="${image}"
                     alt="${code}"
                     loading="lazy">

            </div>
            `;

        });

        document.getElementById("stocks").innerHTML = html;

    }

    catch(error){

        console.log(error);

    }

}

// 처음 열 때 자동 실행
loadStocks(1273627440);

</script>

</body>
</html>
