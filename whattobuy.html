<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:20px;
}

.header{
    display:flex;
    align-items:center;
    margin-bottom:20px;
}

.header h1{
    flex:1;
    text-align:center;
    margin:0;
}

#today{
    flex:1;
    text-align:right;
    padding-right:10%;
    padding-top:10px;
    font-size:20px;
    font-weight:bold;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

button{
    width:150px;
    height:50px;
    font-size:20px;
    cursor:pointer;
}

#stocks{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(700px,1fr));
    gap:30px;
}

.stock{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.stock h2{
    text-align:center;
}

.stock img{
    width:100%;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

    <!-- <h1>뭐살까</h1> -->

    <div id="today"></div>

</div>

<div class="buttons">

    <button onclick="loadStocks(1273627440)">
        눌림매매
    </button>

    <button onclick="loadStocks(710038992)">
        돌파매매
    </button>

</div>

<div id="stocks"></div>

<script>

async function loadStocks(gid){

    const url =
    `https://docs.google.com/spreadsheets/d/1DTmUxYucDWge4wZDUcGJRZQ5KSM-wpsJkxfn48WfA4E/export?format=csv&gid=${gid}`;

    try{

        const response = await fetch(url);

        const csv = await response.text();

        const rows = csv.trim().split("\n");


        // ===== I1 날짜 표시 =====
        if(rows.length > 0){

            const date = rows[0]
                .split(",")[8]
                ?.trim()
                .replace(/"/g,"")
                .replace(/'/g,"");

            document.getElementById("today").innerHTML = date;
        }


        // ===== 종목 카드 생성 =====
        let html = "";

        rows.forEach(row => {

            const cols = row.split(",");

            const code = cols[0]
                ?.trim()
                .replace(/"/g,"")
                .replace(/'/g,"");

            const image = cols[1]
                ?.trim()
                .replace(/"/g,"")
                .replace(/'/g,"");

            // 종목코드나 이미지가 없으면 건너뜀
            if(!code || !image) return;

            html += `
            <div class="stock">

                <h2>${code.padStart(6,"0")}</h2>

                <img
                    src="${image}"
                    alt="${code}"
                    loading="lazy">

            </div>
            `;

        });

        document.getElementById("stocks").innerHTML = html;

    }

    catch(error){

        console.log(error);

    }

}


// 처음 열 때 자동으로 눌림매매 로드
loadStocks(1273627440);

</script>

</body>
</html>
